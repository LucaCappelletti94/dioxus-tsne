[workspace]
members = ["app", "worker"]

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/LucaCappelletti94/dioxus-decompositions"

[workspace.dependencies]
dioxus = "0.7"
gloo-worker = "0.6"
serde = { version = "1", features = ["derive"] }
# The worker bundle is post-processed with the wasm-bindgen CLI installed on the
# machine, whose version must match the crate version exactly. Keep this pin in
# sync with the output of `wasm-bindgen --version`.
wasm-bindgen = "=0.2.121"

[package]
name = "dioxus-decompositions"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Dioxus components to run and visualize decompositions like t-SNE, PCA and more, off the main thread in a web worker"
readme = "README.md"
keywords = ["dioxus", "tsne", "pca", "visualization", "wasm"]
categories = ["visualization", "wasm", "gui"]

[features]
default = ["parquet"]
# Parquet ingestion through the Arrow reader. Snappy is the only compression
# enabled: it is the Parquet default, and the gzip backend (flate2) does not
# build on wasm32-unknown-unknown.
parquet = [
    "dep:arrow-array",
    "dep:arrow-cast",
    "dep:arrow-schema",
    "dep:bytes",
    "dep:parquet",
]

[dependencies]
arrow-array = { version = "58", optional = true }
arrow-cast = { version = "58", optional = true }
arrow-schema = { version = "58", optional = true }
bytes = { version = "1", optional = true }
csv = "1"
dioxus.workspace = true
gloo-worker.workspace = true
parquet = { version = "58", default-features = false, features = [
    "arrow",
    "snap",
], optional = true }
serde.workspace = true

[dev-dependencies]
serde_json = "1.0.150"
