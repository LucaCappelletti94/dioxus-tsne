name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      # The worker is excluded and its build skipped: wasm-bindgen-rayon
      # compile_error!s without the nightly atomics target feature, so it only
      # builds under the build-std recipe in app/build.rs, not here.
      - run: cargo clippy --workspace --exclude decompositions-worker --all-targets --target wasm32-unknown-unknown -- -D warnings
        env:
          DECOMPOSITIONS_SKIP_WORKER_BUILD: "1"

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      # The compute, ingest and PCA tests live on the root crate and run
      # natively, so this needs no wasm target and no worker build.
      - run: cargo test -p dioxus-tsne

  # Production deploy to Cloudflare Pages, on a pushed tag (e.g. v0.1.0) or by
  # hand. Gates on CI jobs so it only deploys when fmt, clippy, and test are
  # green. The worker wasm is rebuilt from scratch here, since the generated
  # bundle is no longer committed.
  deploy:
    name: build and deploy
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [fmt, clippy, test]
    runs-on: ubuntu-latest
    # ~15-20 min cold (build-std + wasm-opt over the worker), well under this.
    timeout-minutes: 45
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7.0.0

      # nightly first, then stable, so stable stays the default toolchain (dx
      # builds the app on it) while nightly remains reachable as `rustup run
      # nightly`, which app/build.rs uses for the worker's atomics + build-std
      # compile. nightly needs rust-src for build-std.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2.9.1

      - uses: cargo-bins/cargo-binstall@main
      # --force: the rust-cache restore brings back binstall's install metadata
      # but not the cached cargo bin, so a plain binstall sees dx as "already
      # installed" and skips it, leaving `dx` off PATH. Reinstalling every run
      # (a fast prebuilt download) keeps the binary present.
      - run: cargo binstall -y --force dioxus-cli@0.7.9

      # DWARF off: dx defaults debug symbols on, which its wasm-opt cannot parse.
      - name: Bundle
        run: dx bundle -p decompositions-app --release --debug-symbols false

      # `pages deploy` does not create the project, it errors with "Project not
      # found" if it is missing. Create it up front, idempotently: the create
      # call is a no-op (non-zero, swallowed) once the project exists.
      - name: Ensure Pages project exists
        run: npx --yes wrangler@4 pages project create dioxus-tsne --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch=main: a tag build checks out a detached HEAD, so without
          # this Wrangler tags the deployment with branch "HEAD" and files it as
          # a Preview. Pinning it to the project's production branch makes it the
          # Production deployment that dioxus-tsne.pages.dev (and the custom
          # domain) actually serve.
          # --commit-dirty: the bundle emits the gitignored worker files, so the
          # tree is dirty at deploy time; that is expected, not a reason to warn.
          command: pages deploy target/dx/decompositions-app/release/web/public --project-name=dioxus-tsne --branch=main --commit-dirty=true
